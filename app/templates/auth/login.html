{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow-lg" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-check text-primary" style="font-size: 3rem;"></i>
        <h4 class="mt-2 fw-bold">TribSync</h4>
        <p class="text-muted small">Validador Tributário NCM</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">E-mail</label>
          <input type="email" name="email" class="form-control" required autofocus
                 placeholder="seu@email.com.br">
        </div>
        <div class="mb-1">
          <label class="form-label fw-semibold">Senha</label>
          <input type="password" name="senha" class="form-control" required>
        </div>
        <div class="text-end mb-3">
          <a href="{{ url_for('auth.esqueci_senha') }}" class="small text-muted">
            Esqueci minha senha
          </a>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>

      <hr class="border-secondary">
      <div class="text-center">
        <span class="text-muted small">Não tem conta?</span>
        <a href="{{ url_for('auth.cadastro') }}" class="small ms-1 fw-semibold">
          Criar conta grátis
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
