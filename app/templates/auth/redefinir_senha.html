{% extends 'base.html' %}
{% block title %}Redefinir Senha{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow-lg" style="width: 100%; max-width: 440px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock text-success" style="font-size: 2.5rem;"></i>
        <h5 class="mt-2 fw-bold">Redefinir senha</h5>
        <p class="text-muted small">Escolha uma nova senha para sua conta.</p>
      </div>

      <form method="POST" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nova senha <span class="text-danger">*</span></label>
          <input type="password" name="nova_senha" class="form-control" required
                 minlength="8" autofocus placeholder="Mínimo 8 caracteres">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirmar nova senha <span class="text-danger">*</span></label>
          <input type="password" name="confirmacao" class="form-control" required
                 minlength="8" placeholder="Repita a senha">
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-check-circle"></i> Redefinir senha
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
