{% extends 'base.html' %}
{% block title %}Novo Usuário{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header"><i class="bi bi-person-plus"></i> Novo Usuário</div>
      <div class="card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="senha" class="form-control" required minlength="8">
          </div>
          <div class="mb-3">
            <label class="form-label">Perfil</label>
            <select name="perfil" class="form-select">
              <option value="operador">Operador</option>
              <option value="visualizador">Visualizador</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Criar usuário</button>
          <a href="{{ url_for('admin.usuarios') }}" class="btn btn-secondary ms-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
